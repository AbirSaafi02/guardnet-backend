<div class="p-8 max-w-lg mx-auto">
  
  <!-- Titre -->
  <h1 class="text-2xl font-bold text-gray-800 mb-8">Mon Profil</h1>

  <!-- Infos compte -->
  <div class="bg-white rounded-xl p-6 shadow mb-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Informations du compte</h2>
    
    <div class="flex items-center gap-4 mb-4">
      <div class="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-content text-white text-2xl font-bold flex items-center justify-center">
        {{ nom[0]?.toUpperCase() }}
      </div>
      <div>
        <p class="font-semibold text-gray-800 text-lg">{{ nom }}</p>
        <p class="text-gray-500">{{ email }}</p>
        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">Administrateur</span>
      </div>
    </div>
  </div>

  <!-- Changer mot de passe -->
  <div class="bg-white rounded-xl p-6 shadow">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Changer le mot de passe</h2>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">Ancien mot de passe</label>
      <input type="password" [(ngModel)]="ancienPassword" 
             class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:border-blue-400"
             placeholder="••••••••" />
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">Nouveau mot de passe</label>
      <input type="password" [(ngModel)]="nouveauPassword"
             class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:border-blue-400"
             placeholder="••••••••" />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-600 mb-1">Confirmer le mot de passe</label>
      <input type="password" [(ngModel)]="confirmPassword"
             class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:border-blue-400"
             placeholder="••••••••" />
    </div>

    <!-- Messages -->
    <div *ngIf="successMessage" class="bg-green-50 text-green-700 p-3 rounded-lg mb-4">
      ✅ {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="bg-red-50 text-red-700 p-3 rounded-lg mb-4">
      ⚠️ {{ errorMessage }}
    </div>

    <button (click)="changerMotDePasse()"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium">
      Enregistrer
    </button>
  </div>

</div>
